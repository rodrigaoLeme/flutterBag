      html, body, #svg-map, #svg-container {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      text {
        font-family: 'Impact', sans-serif;
      }

      /*Simple CSS reset*/
      html {
        box-sizing: border-box;
        font-size: 16px;
      }

      *, *:before, *:after {
        box-sizing: inherit;
      }

      body, h1, h2, h3, h4, h5, h6, p, ol, ul {
        margin: 0;
        padding: 0;
        font-weight: normal;
      }

      ol, ul {
        list-style: none;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      .floor-buttons {
        position: fixed;
        right: 4vw;
        bottom: 4vw;
        display: flex;
        flex-direction: column;
        gap: 3vw;
        z-index: 1000;
      }

      .floor-button {
        width: 30vw;
        height: 20vw;
        max-height: 90px;
        background-color: #00558C;
        color: white;
        border: none;
        border-radius: 999px;
        font-size: 4vw;
        cursor: pointer;
        transition: all 0.2s ease;
        box-sizing: border-box;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 1vw rgba(0, 0, 0, 0.6);
      }

      .floor-button:hover {
        box-shadow: 0 0 8px rgba(49, 97, 135, 0.6);
      }

      .floor-button:active {
        transform: scale(0.96);
      }

      .floor-button.active {
        font-weight: bold;

      }

      .floor-button.inactive {
        background-color: #F5F5F5;
        color: #00558C;
        font-weight: bold;
      }

      #hud-container {
        position: fixed;
        bottom: 4vw;
        left: 4vw;
        z-index: 1000;

    <script>
      const svgElement = document.getElementById("svg-map");

      function selectFloor(floor) {
        panZoom.zoom(2);
        panZoom.center();

        if (floor === "floor1") {
          selectFirstFloor();
        } else {
          selectSecondFloor();
        }
      }

      function selectFirstFloor()
      {
        const btn1 = document.getElementById("btn-floor1");
        const btn2 = document.getElementById("btn-floor2");

        if (!svgElement) return;

        const layer1 = svgElement.getElementById("1-floor");
        const layer2 = svgElement.getElementById("2-floor");

        btn1.classList.add("active");
        btn1.classList.remove("inactive");
        btn2.classList.remove("active");
        btn2.classList.add("inactive");

        if (layer1 && layer2) {
          layer1.style.display = "inline";
          layer2.style.display = "none";
        }
      }

      function selectSecondFloor()
      {
        const btn1 = document.getElementById("btn-floor1");
        const btn2 = document.getElementById("btn-floor2");

        if (!svgElement) return;

        const layer1 = svgElement.getElementById("1-floor");
        const layer2 = svgElement.getElementById("2-floor");

        btn2.classList.add("active");
        btn2.classList.remove("inactive");
        btn1.classList.remove("active");
        btn1.classList.add("inactive");

        if (layer1 && layer2) {
          layer1.style.display = "none";
          layer2.style.display = "inline";
        }
      }

      window.addEventListener("load", () => {
        var panZoom = window.panZoom = svgPanZoom('#svg-map', {
          zoomEnabled: true,
          controlIconsEnabled: false,
          fit: true,
          center: true,
          contain: false,
          minZoom: 1,
          maxZoom: 50,
          eventsListenerElement: document.getElementById('#floors'),
          customEventsHandler: {
            haltEventListeners: ['touchstart', 'touchend', 'touchmove', 'touchleave', 'touchcancel'],
              init: function (options) {
                var instance = options.instance;
                var hammer = new Hammer(options.svgElement, {
                  inputClass: Hammer.SUPPORT_POINTER_EVENTS ? Hammer.PointerEventInput : Hammer.TouchInput
                });

                hammer.get('pinch').set({ enable: true });

                var initialScale = null;
                var pannedX = 0;
                var pannedY = 0;

                hammer.on('doubletap', function () {
                  instance.zoomIn();
                });

                hammer.on('panstart panmove', function (ev) {
                  if (ev.type === 'panstart') {
                    pannedX = 0;
                    pannedY = 0;
                  }

                  instance.panBy({ x: ev.deltaX - pannedX, y: ev.deltaY - pannedY });
                  pannedX = ev.deltaX;
                  pannedY = ev.deltaY;
                });

                hammer.on('pinchstart pinchmove', function (ev) {
                  if (ev.type === 'pinchstart') {
                    initialScale = instance.getZoom();
                  }

                  instance.zoomAtPoint(initialScale * ev.scale, { x: ev.center.x, y: ev.center.y });
                });

                options.hammer = hammer;
              },
              destroy: function (options) {
                options.hammer.destroy();
              }
            }
          });

          const hash = location.hash.replace("#", "");
          if (!hash) return;

          const el = svgElement.getElementById(hash);

          if (!el) {
            console.warn("Elemento com ID não encontrado");
            return;
          }
          console.warn(`Elemento com ID encontrado ${hash}`);

          el.style.fill = "#b68ccc";
          if (hash.startsWith("area")) el.style.fill = "#eeebec";

          let zoom = 10;

          var secondFloorRooms = ["bleachers-112","room-145","room-117","room-110","room-126","room-200","room-274","room-275","room-276","room-266","room-261","room-265","room-262","room-267","room-260","room-264","room-263","room-256","room-255","room-253","room-252","room-251","room-250","room-230","room-americas-ballroom","room-240","room-241","room-242","room-232"];
          if (secondFloorRooms.includes(hash)) selectSecondFloor();
          else {
            if (hash.startsWith("booth")) zoom = 50;
            if (hash.startsWith("room")) zoom = 10;
            if (hash == "area-dining-hall") zoom = 5;
            if (hash == "area-arena") zoom = 6;
            if (hash == "area-exhibit-hall") zoom = 2;
          }

          let sizes = panZoom.getSizes();
          const viewBoxHeight = sizes.viewBox.height;
          const viewBoxWidth = sizes.viewBox.width;
          //console.log(`viewBoxWidth: {width: ${viewBoxWidth}, height: ${viewBoxHeight}}`);

          const clientWidth = svgElement.clientWidth;
          const clientHeight = svgElement.clientHeight;
          //console.log(`clientWidth: {width: ${clientWidth}, height: ${clientHeight}}`);

          const width = parseFloat(svgElement.getAttribute("width") );
          const height = parseFloat(svgElement.getAttribute("height"));
          //console.log(`svg: {width: ${width}, height: ${height}}`);

          const escalaX = clientWidth / viewBoxWidth;
          const escalaY = clientHeight / viewBoxHeight;
          const escala = Math.min(escalaX, escalaY);
          //console.log(`escala: {x: ${escalaX}, y: ${escalaY}}`);

          const bbox = el.getBBox();
          //console.log(`elBBox: {x: ${bbox.x}, y: ${bbox.y}}`);
          //console.log(`elBBox center: {x: ${bbox.x + bbox.width / 2}, y: ${bbox.y + bbox.height / 2}}`);

          const x_point = ((bbox.x * escala * zoom) - (clientWidth / 2) + (bbox.width * escala * zoom / 2));
          const y_point = ((bbox.y * escala * zoom) - (clientHeight / 2) + (bbox.height * escala  * zoom/ 2));
          //console.log(`points: {x: ${x_point}, y: ${y_point}}`);

          panZoom.zoom(zoom);
          panZoom.pan({x:-x_point,y:-y_point});
        });

      window.onresize = function () {
        if (window.panZoom) {
          window.panZoom.resize();
          window.panZoom.fit();
          window.panZoom.center();
        }
      };
    </script>
