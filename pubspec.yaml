name: ebolsaapp
description: e-Bolsa EA - Solicitação de bolsas de estudo.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navegação e DI
  flutter_modular: ^6.4.1

  # HTTP
  dio: ^5.9.2
  
  # Armazenamento seguro (para tokens)
  flutter_secure_storage: ^10.0.0

  # Armazenamento local (para os JSON por etapas)
  path_provider: ^2.1.5

  # Firebase
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0
  firebase_messaging: ^16.2.0

  # Notificações locais
  flutter_local_notifications: ^21.0.0
  
  # Câmera e scanner de documentos
  camera: ^0.12.0+1
  cunning_document_scanner: ^1.4.0

  # Seleção de arquivos e PDFs
  file_picker: ^11.0.2
  pdf: ^3.12.0
  open_filex: ^4.7.0

  # Permissões
  permission_handler: ^12.0.1

  # Validação e formatação
  cpf_cnpj_validator: ^2.0.0
  mask_text_input_formatter: ^2.9.0
  intl: ^0.20.2

  # UI
  cupertino_icons: ^1.0.9

  # Info do device
  device_info_plus: ^11.3.3

  # Formatação de datas relativas
  timeago: ^3.7.1

  # Splash
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0

dependency_overrides:

flutter:
  uses-material-design: true
  assets:
    - lib/ui/assets/images/
    - lib/ui/assets/icons/fonts/
  fonts:
    - family: EbolsasIcons
      fonts:
        - asset: lib/ui/assets/icons/fonts/EbolsasIcons.ttf
