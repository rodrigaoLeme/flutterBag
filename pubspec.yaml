name: ebolsaapp
description: A new Flutter project.
publish_to: 'none'
version: 1.0.10+14

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  open_document:
    git:
      url: https://github.com/rodrigaoLeme/open_document_custom
      ref: ab861d8a56cb44783a0adc26182354bfce434510
  document_scanner_flutter:
    git:
      url: https://github.com/rodrigaoLeme/document_scanner_flutter_custom.git
      ref: 03ef04d55bf938a343e6d397d879801208e1a1c3
  cunning_document_scanner: ^1.2.3

  cupertino_icons: ^1.0.5
  flutter_modular: ^5.0.3
  flutter_triple: ^1.2.7+4
  mask_text_input_formatter: ^2.4.0
  dotted_border: ^2.0.0+2
  expansion_widget: ^0.0.3
  localization: ^2.1.0
  dio: ^5.1.0
  hive_flutter: ^1.1.0
  flutter_native_splash: ^2.4.4
  jwt_decoder:
    git:
      url: https://github.com/gustavo0197/dart-jwt-decoder.git
      ref: 4d6aa37b8adc224fe96da11f50af01d54832d0a1
  cpf_cnpj_validator: ^2.0.0
  intl: ^0.19.0
  camera: ^0.11.1
  device_info_plus: ^10.1.2
  pdf: ^3.8.3
  path_provider: ^2.0.11
  permission_handler: ^11.4.0
  simple_html_css: ^5.0.0
  file_picker: ^8.1.0
  http_parser: ^4.0.1
  url_launcher: ^6.1.5
  either_dart: ^0.2.0
  flutter_secure_storage: ^8.0.0
  uuid: ^3.0.7
  flutter_local_notifications: ^19.0.0
  firebase_core: ^3.12.1
  firebase_analytics: ^11.4.4
  firebase_messaging: ^15.2.4
  upgrader: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  triple_test: ^1.0.0+1
  modular_test: ^2.0.0
  mocktail: ^0.3.0
  icons_launcher: ^2.0.3

dependency_overrides:
  photo_view: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - lib/app/core/i18n/
    - lib/app/core/temporary_assets/
  fonts:
    - family: EbolsasIcons
      fonts:
        - asset: lib/app/core/icons/fonts/EbolsasIcons.ttf
